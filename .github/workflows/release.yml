name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'SKILL.md'
      - 'README.md'
      - '.github/workflows/release.yml'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from SKILL.md
        id: version
        run: |
          VERSION=$(grep "version:" SKILL.md | head -1 | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view v${{ steps.version.outputs.version }} 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build .skill file
        if: steps.check_release.outputs.exists == 'false'
        run: |
          zip -r agent-os-workshop.skill . -x ".git*" "*.DS_Store" ".github/workflows*"

      - name: Get commit message
        id: commit_msg
        run: |
          MSG=$(git log -1 --pretty=%B)
          MSG="${MSG//'%'/'%25'}"
          MSG="${MSG//$'\n'/'%0A'}"
          MSG="${MSG//$'\r'/'%0D'}"
          echo "message=$MSG" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Changes
            
            ${{ steps.commit_msg.outputs.message }}
          files: |
            agent-os-workshop.skill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Slack (optional)
        if: steps.check_release.outputs.exists == 'false'
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"BoS OS Workshop v${{ steps.version.outputs.version }} released"}' \
            ${{ secrets.SLACK_WEBHOOK_URL }} || true

